name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Types · Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies (frozen)
        run: uv sync --frozen --extra postgres

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Mypy (types)
        run: uv run mypy

      - name: Pytest
        # The suite is offline — no API key or network required.
        run: uv run pytest -q

  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Build (no push)
        run: docker build -t agentic-research-agent:${{ github.sha }} .
      # Add image scanning (e.g. Trivy) and a registry push on tagged releases.
